server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://bff:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        proxy_pass http://bff:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Proxy GSI input to the gsi_processor so the VDF can point at the front
    # host and be forwarded into the internal GSI processor service.
    # Exact match without trailing slash - proxy directly to backend path to avoid nginx auto-redirect
    location = /gsi-input {
        proxy_pass http://gsi_processor:8001/gsi-input;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Match with trailing slash or subpaths
    location /gsi-input/ {
        proxy_pass http://gsi_processor:8001/gsi-input;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
