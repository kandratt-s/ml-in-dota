services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432" # я прокинул порты для удобства, можно удолить потом. 
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/postgres_init:/docker-entrypoint-initdb.d
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    restart: always
    # ports:
    #   - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_network

  # bot:
  #   build:
  #     context: .  # Важно: контекст - КОРЕНЬ проекта, не services/bot!
  #     dockerfile: services/bot/Dockerfile
  #   restart: always
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   env_file:
  #     - .env
  #   environment:
  #     DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  #   networks:
  #     - app_network

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - app_network
    ports:
      - 8001:8001

  # gsi_processor:
  #   build:
  #     context: .
  #     dockerfile: services/gsi_processor/Dockerfile
  #   restart: always
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #   env_file:
  #     - .env
  #   networks:
  #     - app_network
  #   ports:
  #     - 8000:8000

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    restart: always
    depends_on:
      auth:
        condition: service_started
    env_file:
      - .env
    environment:
      AUTH_BASE_URL: http://auth:8001/api/v1
      REQUEST_TIMEOUT_SECONDS: 10
      CELLS: ${CELLS:-32}
      MAP_PATH: assets/600px-Gamemap_7.40_minimap_dota2_gameasset.png
    networks:
      - app_network
    ports:
      - 8501:8501

volumes:
  postgres_data:
  redis_data:

networks:
  app_network:
    driver: bridge