services:
  postgres:
    image: postgres:16
    container_name: ml-dota-postgres
    restart: always
    env_file:
      - .env
    environment:
      # Override with docker internal port
      POSTGRES_PORT: 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/postgres_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    # Ports exposed only for local development/debugging if needed
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    container_name: ml-dota-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_network
    # Ports exposed only for local development/debugging if needed
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"

  inference:
    build:
      context: .
      dockerfile: services/inference/Dockerfile
    container_name: ml-dota-inference
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Internal Docker network communication
      REDIS_HOST: redis
      REDIS_PORT: 6379
      INFERENCE_PORT: 8000
      INFERENCE_INPUT_QUEUE: "inference:input"
      INFERENCE_OUTPUT_QUEUE: "inference:output"
      HEATMAP_RESULT_KEY: "heat_map"
      BATCH_SIZE: 16
      POLL_INTERVAL_SECONDS: 1.0
      CELLS: ${CELLS:-32}
      MODEL_PATH: /app/services/inference/scr/infra/model.cbm
    networks:
      - app_network
    ports:
      - "${INFERENCE_EXTERNAL_PORT:-8000}:8000"
    expose:
      - "8000"

  gsi_processor:
    build:
      context: .
      dockerfile: services/gsi_processor/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - app_network
    ports:
      - "${GSI_PROCESSOR_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  bff:
    build:
      context: .
      dockerfile: services/bff/Dockerfile
    container_name: ml-dota-bff
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      inference:
        condition: service_started
    env_file:
      - .env
    environment:
      BFF_ADDR: ":8080"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PREDICTION_KEY_PREFIX: predictions
      PREDICTION_POLL_MS: 1000
    networks:
      - app_network
    ports:
      - "${BFF_EXTERNAL_PORT:-8080}:8080"
    expose:
      - "8080"

  front:
    build:
      context: .
      dockerfile: services/front/Dockerfile
    container_name: ml-dota-front
    restart: always
    depends_on:
      - bff
    networks:
      - app_network
    ports:
      - "${FRONT_EXTERNAL_PORT:-3000}:3000"
    expose:
      - "3000"

volumes:
  postgres_data:
  redis_data:

networks:
  app_network:
    driver: bridge