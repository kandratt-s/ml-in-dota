  redis:
    image: redis:7-alpine
    container_name: ml-dota-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_network
    env_file:
      - .env

  inference:
    build:
      context: .
      dockerfile: services/inference/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - app_network

  gsi_processor:
    build:
      context: .
      dockerfile: services/gsi_processor/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - app_network
    ports:
      - "${GSI_PROCESSOR_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  bff:
    build:
      context: .
      dockerfile: services/bff/Dockerfile
    container_name: ml-dota-bff
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      inference:
        condition: service_started
    env_file:
      - .env
    networks:
      - app_network


  front:
    build:
      context: .
      dockerfile: services/front/Dockerfile
    container_name: ml-dota-front
    restart: always
    depends_on:
      - bff
    networks:
      - app_network
    ports:
      - "${FRONT_EXTERNAL_PORT:-3000}:3000"


volumes:
  postgres_data:
  redis_data:

networks:
  app_network:
    driver: bridge